<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fernwood Montessori — Student &amp; Family Hub</title>
  <meta name="description" content="Breakfast menus, lunch menus, district calendar, and weekly newsletter for Fernwood Montessori families." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { margin: 0; height: 100%; }
    body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #f0f4f0; color: #2d3748; }
    @keyframes fwspin { to { transform: rotate(360deg); } }
    @keyframes fwfadein { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fwslide { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
  /*
   * ============================================================
   *  FERNWOOD MONTESSORI HUB
   *  --------------------------------------------------------
   *  HOW TO UPDATE CONTENT:
   *  Simply change the URLs below, then commit & push to GitHub.
   *  The app will automatically display the new content.
   *
   *  For the newsletter, paste the Google Doc share link.
   *  The app auto-converts /edit URLs to /preview for embedding.
   *
   *  For the calendar, paste the new PDF URL when MPS updates it.
   * ============================================================
   */
  const CONFIG = {
    schoolName: "Fernwood Montessori",
    breakfastMenuUrl:
      "https://resources.finalsite.net/images/v1772224302/mpsmilwaukeek12wius/bpoefmzs3n7rpwa6joog/MarchELBreakfastMenu-MilwaukeePublicSchools.pdf",
    lunchMenuUrl:
      "https://resources.finalsite.net/images/v1772224302/mpsmilwaukeek12wius/xv7gvhde7wwg4iy4uezb/MarchELLunchMenu-MilwaukeePublicSchools.pdf",
    districtCalendarUrl:
      "https://resources.finalsite.net/images/v1766515266/mpsmilwaukeek12wius/wue9wcski23lt4gxz6ey/mps-district-calendar-2526v8.pdf",
    newsletterUrl:
      "https://docs.google.com/document/d/REPLACE_WITH_REAL_DOC_ID/preview",
  };

  const e = React.createElement;
  const { useState, useEffect } = React;

  const SECTIONS = [
    { id: "breakfast", label: "Breakfast Menu", icon: "\u{1F305}", color: "#F59E42", desc: "View this month's breakfast menu from MPS." },
    { id: "lunch",     label: "Lunch Menu",     icon: "\u{1F34E}", color: "#43A047", desc: "View this month's lunch menu from MPS." },
    { id: "calendar",  label: "District Calendar", icon: "\u{1F4C5}", color: "#5C6BC0", desc: "Milwaukee Public Schools district calendar." },
    { id: "newsletter",label: "Newsletter",     icon: "\u{1F4F0}", color: "#AB47BC", desc: "The latest Fernwood Montessori newsletter." },
  ];

  function getUrl(id) {
    switch (id) {
      case "breakfast": return CONFIG.breakfastMenuUrl;
      case "lunch": return CONFIG.lunchMenuUrl;
      case "calendar": return CONFIG.districtCalendarUrl;
      case "newsletter": return CONFIG.newsletterUrl;
      default: return "";
    }
  }

  function Leaf(props) {
    return e("svg", {
      viewBox: "0 0 24 24", fill: "none", stroke: "currentColor",
      strokeWidth: "1.5", strokeLinecap: "round", strokeLinejoin: "round",
      style: { width: 20, height: 20, ...props.style }
    }, e("path", { d: "M12 2C6.5 2 2 6.5 2 12c4-1 7-3 10-6 0 4-2 8-5 11 5-1 9-5 10-10 0-2-1-4-3-5z" }));
  }

  /* ══════════════════════════════════════════════════════
     DOCUMENT VIEWER — full screen with floating back button
     ══════════════════════════════════════════════════════ */
  function DocViewer(_ref) {
    var section = _ref.section, onBack = _ref.onBack;
    var url = getUrl(section.id);
    var isPdf = url.toLowerCase().includes(".pdf");
    var isGDoc = url.includes("docs.google.com");
    var embedUrl = url;
    if (isGDoc) embedUrl = url.replace(/\/edit.*$/, "/preview").replace(/\/pub.*$/, "/preview");
    var gViewer = "https://docs.google.com/gview?url=" + encodeURIComponent(url) + "&embedded=true";
    var src = isPdf ? gViewer : embedUrl;

    var statusState = useState("loading");
    var status = statusState[0], setStatus = statusState[1];

    useEffect(function() {
      var t = setTimeout(function() { setStatus(function(p) { return p === "loading" ? "failed" : p; }); }, 8000);
      return function() { clearTimeout(t); };
    }, []);

    return e("div", { style: S.viewerRoot },

      /* floating back button — top left */
      e("button", {
        onClick: onBack, style: S.floatingBack,
        onMouseEnter: function(ev) { ev.currentTarget.style.background = "#fff"; ev.currentTarget.style.boxShadow = "0 4px 20px rgba(0,0,0,0.18)"; },
        onMouseLeave: function(ev) { ev.currentTarget.style.background = "rgba(255,255,255,0.95)"; ev.currentTarget.style.boxShadow = "0 2px 12px rgba(0,0,0,0.12)"; },
      },
        e("span", { style: { fontSize: 18, lineHeight: 1 } }, "\u2190"),
        e("span", { style: { fontWeight: 700 } }, "Home")),

      /* floating title pill — top center */
      e("div", { style: { ...S.floatingTitle, background: section.color } },
        e("span", { style: { fontSize: 16 } }, section.icon),
        e("span", { style: { fontWeight: 700 } }, section.label)),

      /* floating "open in new tab" — top right */
      e("a", {
        href: url, target: "_blank", rel: "noopener noreferrer", style: S.floatingOpen,
        onMouseEnter: function(ev) { ev.currentTarget.style.background = "#fff"; },
        onMouseLeave: function(ev) { ev.currentTarget.style.background = "rgba(255,255,255,0.95)"; },
      }, "New tab \u2197"),

      /* loading state */
      status === "loading" && e("div", { style: S.loadingOverlay },
        e("div", { style: { ...S.spinner, borderTopColor: section.color } }),
        e("p", { style: S.loadingText }, "Loading " + section.label + "\u2026")),

      /* failed state */
      status === "failed" && e("div", { style: S.failedOverlay },
        e("p", { style: { margin: 0, fontSize: 48 } }, section.icon),
        e("h3", { style: { margin: "12px 0 4px", fontSize: 20, color: section.color } }, section.label),
        e("p", { style: S.failedText },
          "This document can\u2019t be previewed here. Tap below to open it directly."),
        e("a", { href: url, target: "_blank", rel: "noopener noreferrer",
          style: { ...S.failedBtn, background: section.color } },
          "Open " + section.label + " \u2197"),
        e("button", { onClick: onBack, style: S.failedBackBtn }, "\u2190 Back to Home")),

      /* iframe — takes up full screen behind the floating buttons */
      e("iframe", {
        src: src, title: section.label,
        style: { ...S.fullIframe, opacity: status === "loaded" ? 1 : 0, pointerEvents: status === "loaded" ? "auto" : "none" },
        onLoad: function() { setStatus("loaded"); },
        onError: function() { setStatus("failed"); },
      }));
  }

  /* ══════════════════════════════════════════════════════
     LANDING PAGE
     ══════════════════════════════════════════════════════ */
  function Landing(_ref) {
    var onSelect = _ref.onSelect;

    return e("div", { style: S.landingRoot },
      /* header */
      e("header", { style: S.header },
        e(Leaf, { style: { color: "#81C784", position: "absolute", top: 14, left: 18, opacity: 0.3, transform: "rotate(-30deg)" } }),
        e(Leaf, { style: { color: "#A5D6A7", position: "absolute", top: 10, right: 50, opacity: 0.2, transform: "rotate(15deg) scale(1.4)" } }),
        e("div", { style: S.headerContent },
          e("div", { style: S.logoCircle }, e("span", { style: { fontSize: 24 } }, "\u{1F33F}")),
          e("div", null,
            e("h1", { style: S.schoolName }, CONFIG.schoolName),
            e("p", { style: S.subtitle }, "Student & Family Hub")))),

      /* main */
      e("main", { style: S.landingMain },
        e("div", { style: S.welcomeSection },
          e("h2", { style: S.welcomeTitle }, "Welcome!"),
          e("p", { style: S.welcomeText }, "Tap any card below to view it.")),

        e("div", { style: S.cardGrid },
          SECTIONS.map(function(s, i) {
            return e("button", {
              key: s.id, onClick: function() { onSelect(s.id); },
              style: { ...S.card, animationDelay: (i * 0.07) + "s" },
              onMouseEnter: function(ev) {
                ev.currentTarget.style.transform = "translateY(-5px)";
                ev.currentTarget.style.boxShadow = "0 10px 30px " + s.color + "25";
                ev.currentTarget.style.borderColor = s.color;
              },
              onMouseLeave: function(ev) {
                ev.currentTarget.style.transform = "translateY(0)";
                ev.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.06)";
                ev.currentTarget.style.borderColor = "#e2e8f0";
              },
            },
              e("div", { style: { ...S.cardIconWrap, background: s.color + "14" } },
                e("span", { style: { fontSize: 32 } }, s.icon)),
              e("h3", { style: { ...S.cardTitle, color: s.color } }, s.label),
              e("p", { style: S.cardDesc }, s.desc),
              e("span", { style: { ...S.cardCta, color: s.color } }, "Open \u2192"));
          }))),

      /* footer */
      e("footer", { style: S.footer },
        e("p", { style: S.footerText }, "Content linked from Milwaukee Public Schools district resources.")));
  }

  /* ══════════════════════════════════════════════════════
     APP
     ══════════════════════════════════════════════════════ */
  function App() {
    var activeState = useState(null);
    var active = activeState[0], setActive = activeState[1];
    var section = active ? SECTIONS.find(function(s) { return s.id === active; }) : null;

    if (section) {
      return e(DocViewer, { section: section, onBack: function() { setActive(null); } });
    }
    return e(Landing, { onSelect: function(id) { setActive(id); } });
  }

  /* ══════════════════════════════════════════════════════
     STYLES
     ══════════════════════════════════════════════════════ */
  var S = {
    /* landing */
    landingRoot: { minHeight: "100vh", display: "flex", flexDirection: "column" },
    header: { background: "linear-gradient(135deg,#2E7D32 0%,#388E3C 40%,#43A047 100%)", color: "#fff", padding: "18px 24px", position: "relative", boxShadow: "0 2px 12px rgba(46,125,50,0.25)" },
    headerContent: { display: "flex", alignItems: "center", gap: 14, position: "relative", zIndex: 2, maxWidth: 800, margin: "0 auto" },
    logoCircle: { width: 48, height: 48, borderRadius: "50%", background: "rgba(255,255,255,0.2)", display: "flex", alignItems: "center", justifyContent: "center", border: "2px solid rgba(255,255,255,0.3)", flexShrink: 0 },
    schoolName: { margin: 0, fontSize: 22, fontWeight: 800, letterSpacing: "-0.02em", textShadow: "0 1px 3px rgba(0,0,0,0.15)" },
    subtitle: { margin: "2px 0 0", fontSize: 12, fontWeight: 500, opacity: 0.85, letterSpacing: "0.04em", textTransform: "uppercase" },
    landingMain: { flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 20px" },
    welcomeSection: { textAlign: "center", marginBottom: 28 },
    welcomeTitle: { margin: 0, fontSize: 28, fontWeight: 800, color: "#2E7D32" },
    welcomeText: { margin: "8px 0 0", fontSize: 15, color: "#718096" },
    cardGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 16, width: "100%", maxWidth: 720 },
    card: { background: "#fff", border: "1px solid #e2e8f0", borderRadius: 16, padding: "28px 18px 22px", cursor: "pointer", textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, transition: "all 0.2s ease", boxShadow: "0 2px 8px rgba(0,0,0,0.06)", fontFamily: "inherit", animation: "fwfadein 0.4s ease both" },
    cardIconWrap: { width: 60, height: 60, borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 4 },
    cardTitle: { margin: 0, fontSize: 16, fontWeight: 800 },
    cardDesc: { margin: 0, fontSize: 13, color: "#718096", lineHeight: 1.5 },
    cardCta: { marginTop: 6, fontSize: 14, fontWeight: 700 },
    footer: { padding: "14px 20px", textAlign: "center", borderTop: "1px solid #e2e8f0" },
    footerText: { margin: 0, fontSize: 12, color: "#a0aec0" },

    /* viewer */
    viewerRoot: { position: "fixed", inset: 0, background: "#f5f5f5", display: "flex", flexDirection: "column", zIndex: 100 },
    floatingBack: { position: "fixed", top: 12, left: 12, zIndex: 200, display: "flex", alignItems: "center", gap: 6, background: "rgba(255,255,255,0.95)", border: "1px solid #e2e8f0", borderRadius: 10, padding: "8px 16px", fontSize: 14, color: "#2d3748", cursor: "pointer", fontFamily: "inherit", boxShadow: "0 2px 12px rgba(0,0,0,0.12)", transition: "all 0.15s ease", animation: "fwslide 0.3s ease" },
    floatingTitle: { position: "fixed", top: 12, left: "50%", transform: "translateX(-50%)", zIndex: 200, display: "flex", alignItems: "center", gap: 8, color: "#fff", borderRadius: 10, padding: "8px 18px", fontSize: 14, boxShadow: "0 2px 12px rgba(0,0,0,0.15)", animation: "fwfadein 0.3s ease", whiteSpace: "nowrap" },
    floatingOpen: { position: "fixed", top: 12, right: 12, zIndex: 200, display: "flex", alignItems: "center", gap: 4, background: "rgba(255,255,255,0.95)", border: "1px solid #e2e8f0", borderRadius: 10, padding: "8px 16px", fontSize: 13, fontWeight: 600, color: "#4a5568", textDecoration: "none", boxShadow: "0 2px 12px rgba(0,0,0,0.12)", transition: "all 0.15s ease", animation: "fwslide 0.3s ease", fontFamily: "inherit" },
    fullIframe: { flex: 1, width: "100%", border: "none", transition: "opacity 0.3s ease" },
    loadingOverlay: { position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#fafcfa", zIndex: 50 },
    spinner: { width: 40, height: 40, border: "3px solid #e2e8f0", borderTopWidth: 3, borderRadius: "50%", animation: "fwspin 0.8s linear infinite" },
    loadingText: { marginTop: 14, fontSize: 15, color: "#718096", fontWeight: 500 },
    failedOverlay: { position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#fafcfa", zIndex: 50, padding: 30, gap: 10 },
    failedText: { margin: 0, color: "#718096", fontSize: 15, maxWidth: 320, lineHeight: 1.6, textAlign: "center" },
    failedBtn: { display: "inline-block", padding: "12px 28px", color: "#fff", borderRadius: 10, textDecoration: "none", fontWeight: 700, fontSize: 15, marginTop: 8 },
    failedBackBtn: { background: "none", border: "1px solid #cbd5e0", borderRadius: 10, padding: "10px 22px", fontSize: 14, fontWeight: 600, color: "#4a5568", cursor: "pointer", fontFamily: "inherit", marginTop: 4 },
  };

  ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>
