<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Fernwood Montessori — Student &amp; Family Hub</title>
  <meta name="description" content="Breakfast menus, lunch menus, district calendar, and weekly newsletter for Fernwood Montessori families." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>

  </style>
</head>
<body>
  <div id="root"></div>
  <script>
  /*
   * ============================================================
   *  FERNWOOD MONTESSORI HUB
   *  --------------------------------------------------------
   *  HOW TO UPDATE CONTENT:
   *  Simply change the URLs below, then commit & push to GitHub.
   *
   *  For the newsletter, paste the Google Doc URL each week.
   *  The app auto-converts /edit URLs to /preview for embedding.
   *
   *  For the calendar, paste the new PDF URL when MPS updates it.
   * ============================================================
   */
  const CONFIG = {
    schoolName: "Fernwood Montessori",
    breakfastMenuUrl:
      "https://resources.finalsite.net/images/v1772224302/mpsmilwaukeek12wius/bpoefmzs3n7rpwa6joog/MarchELBreakfastMenu-MilwaukeePublicSchools.pdf",

  const e = React.createElement;
  const { useState, useEffect } = React;

  const SECTIONS = [
    { id: "breakfast", label: "Breakfast Menu", icon: "\u{1F305}", color: "#F59E42", desc: "This month's MPS breakfast menu" },
    { id: "lunch",     label: "Lunch Menu",     icon: "\u{1F34E}", color: "#43A047", desc: "This month's MPS lunch menu" },
    { id: "calendar",  label: "District Calendar", icon: "\u{1F4C5}", color: "#5C6BC0", desc: "MPS district calendar" },
    { id: "newsletter",label: "Newsletter",     icon: "\u{1F4F0}", color: "#AB47BC", desc: "Weekly Fernwood newsletter" },
  ];

  function getUrl(id) {
    switch (id) {
      case "breakfast": return CONFIG.breakfastMenuUrl;
      case "lunch": return CONFIG.lunchMenuUrl;
      case "calendar": return CONFIG.districtCalendarUrl;
      case "newsletter": return CONFIG.newsletterUrl;
      default: return "";
    }
  }

  function Leaf(props) {
    return e("svg", {
      viewBox: "0 0 24 24", fill: "none", stroke: "currentColor",
      strokeWidth: "1.5", strokeLinecap: "round", strokeLinejoin: "round",

    }, e("path", { d: "M12 2C6.5 2 2 6.5 2 12c4-1 7-3 10-6 0 4-2 8-5 11 5-1 9-5 10-10 0-2-1-4-3-5z" }));
  }

  /* ══════════════════════════════════════════════════════
     DOCUMENT VIEWER
     Uses the browser's native PDF viewer via <object> + <iframe>
     or direct iframe for Google Docs
     ══════════════════════════════════════════════════════ */
  function DocViewer(_ref) {

    var url = getUrl(section.id);

    var embedUrl = url;
    if (isGDoc) embedUrl = url.replace(/\/edit.*$/, "/preview").replace(/\/pub.*$/, "/preview");

    return e("div", { style: S.viewerRoot },

      /* thin top bar */
      e("div", { style: { ...S.topBar, borderBottomColor: section.color + "33" } },
        e("button", { onClick: onBack, style: S.backBtn },
          e("span", { style: { fontSize: 16 } }, "\u2190"), " Home"),
        e("div", { style: S.topBarCenter },
          e("span", { style: { fontSize: 16 } }, section.icon),
          e("span", { style: { fontWeight: 700, color: section.color } }, section.label)),
        hasUrl
          ? e("a", { href: url, target: "_blank", rel: "noopener noreferrer", style: S.newTabBtn }, "New tab \u2197")
          : e("div", { style: { width: 80 } })),

      /* content area */
      !hasUrl
        ? /* no URL */
          e("div", { style: { flex: 1, position: "relative" } },
            e("div", { style: S.centerMsg },
              e("p", { style: { margin: 0, fontSize: 48 } }, section.icon),
              e("h3", { style: { margin: "12px 0 6px", fontSize: 20, color: section.color } }, section.label),
              e("p", { style: S.centerMsgText }, "No link has been added for this item yet. Check back soon!"),
              e("button", { onClick: onBack, style: { ...S.centerBackBtn, borderColor: section.color, color: section.color } }, "\u2190 Back to Home")))

        : isPdf
          ? /* PDF: use <object> with <iframe> fallback inside it */

              e("object", {

                type: "application/pdf",
                style: S.embedFull,

                /* fallback if <object> fails: try iframe with Google viewer */

                  title: section.label,
                  style: S.embedFull,

            e("div", { style: S.embedArea },
              e("iframe", {
                src: embedUrl,
                title: section.label,
                style: S.embedFull,
              })));
  }

  /* ══════════════════════════════════════════════════════
     LANDING PAGE
     ══════════════════════════════════════════════════════ */

        e("div", { style: S.headerContent },
          e("div", { style: S.logoCircle }, e("span", { style: { fontSize: 22 } }, "\u{1F33F}")),
          e("div", null,
            e("h1", { style: S.schoolName }, CONFIG.schoolName),
            e("p", { style: S.subtitle }, "Student & Family Hub")))),

        !isMobile && e("div", { style: S.welcomeSection },
          e("h2", { style: S.welcomeTitle }, "Welcome!"),
          e("p", { style: S.welcomeText }, "Select an item below to view it.")),

        isMobile
          ? e("div", { style: S.mobileCardList },
              SECTIONS.map(function(s, i) {
                return e("button", {
                  key: s.id, onClick: function() { onSelect(s.id); },
                  style: { ...S.mobileCard, animationDelay: (i * 0.06) + "s" },

                    e("p", { style: S.mobileCardDesc }, s.desc)),

                  key: s.id, onClick: function() { onSelect(s.id); },
                  style: { ...S.card, animationDelay: (i * 0.07) + "s" },
                  onMouseEnter: function(ev) {

                    ev.currentTarget.style.boxShadow = "0 10px 30px " + s.color + "25";
                    ev.currentTarget.style.borderColor = s.color;

                  onMouseLeave: function(ev) {

                  e("div", { style: { ...S.cardIconWrap, background: s.color + "14" } },
                    e("span", { style: { fontSize: 32 } }, s.icon)),
                  e("h3", { style: { ...S.cardTitle, color: s.color } }, s.label),
                  e("p", { style: S.cardDesc }, s.desc),
                  e("span", { style: { ...S.cardCta, color: s.color } }, "Open \u2192"));
              }))),

      e("footer", { style: S.footer },
        e("p", { style: S.footerText }, "Content linked from Milwaukee Public Schools district resources.")));
  }

  /* ══════════════════════════════════════════════════════ */
  function App() {
    var activeState = useState(null);
    var active = activeState[0], setActive = activeState[1];
    var section = active ? SECTIONS.find(function(s) { return s.id === active; }) : null;
    if (section) return e(DocViewer, { section: section, onBack: function() { setActive(null); } });
    return e(Landing, { onSelect: function(id) { setActive(id); } });
  }

  /* ══════════════════════════════════════════════════════
     STYLES
     ══════════════════════════════════════════════════════ */
  var S = {

    headerContent: { display: "flex", alignItems: "center", gap: 12, position: "relative", zIndex: 2, maxWidth: 800, margin: "0 auto" },

    schoolName: { margin: 0, fontSize: 20, fontWeight: 800, letterSpacing: "-0.02em", textShadow: "0 1px 3px rgba(0,0,0,0.15)" },
    subtitle: { margin: "1px 0 0", fontSize: 11, fontWeight: 500, opacity: 0.85, letterSpacing: "0.04em", textTransform: "uppercase" },
    landingMain: { flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "24px 16px" },
    welcomeSection: { textAlign: "center", marginBottom: 24 },
