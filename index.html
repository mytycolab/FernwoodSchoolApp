  <title>Fernwood Montessori — Student &amp; Family Hub</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏴‍☠️</text></svg>" />

<body>
  <div id="root"></div>
  <script>
  /*
   * ============================================================
   *  FERNWOOD MONTESSORI HUB
   *  --------------------------------------------------------
   *  HOW TO UPDATE CONTENT:
   *  Use the Admin button at the bottom of the app, or
   *  change the URLs below and commit & push to GitHub.
   *
   *  NEWSLETTERS: Add the newest one at the TOP of the list.

   *
   *  PDFs: Paste the direct MPS PDF link.
   *  Google Docs: Paste the share URL (auto-converts to /preview).

   */

      "https://resources.finalsite.net/images/v1772224302/mpsmilwaukeek12wius/xv7gvhde7wwg4iy4uezb/MarchELLunchMenu-MilwaukeePublicSchools.pdf",

      { label: "Newsletter #24 — 2/24/26", url: "" },
    ],
    adminPassword: "PirateFernwood",
  };

  const e = React.createElement;
  const { useState, useEffect } = React;

  const SECTIONS = [
    { id: "breakfast", label: "Breakfast Menu", icon: "\u{1F305}", color: "#C62828", desc: "This month's MPS breakfast menu" },
    { id: "lunch",     label: "Lunch Menu",     icon: "\u{1F34E}", color: "#D32F2F", desc: "This month's MPS lunch menu" },
    { id: "calendar",  label: "District Calendar", icon: "\u{1F4C5}", color: "#1a1a1a", desc: "MPS district calendar" },
    { id: "newsletter",label: "Newsletter",     icon: "\u{1F4F0}", color: "#B71C1C", desc: "Weekly Fernwood newsletter" },
  ];

  function getUrl(id) {
    if (id === "breakfast") return CONFIG.breakfastMenuUrl;
    if (id === "lunch") return CONFIG.lunchMenuUrl;
    if (id === "calendar") return CONFIG.districtCalendarUrl;
    if (id === "newsletter") return (CONFIG.newsletters[0] && CONFIG.newsletters[0].url) || "";
    return "";
  }

  function getEmbedUrl(url) {
    if (!url) return "";
    if (url.toLowerCase().includes(".pdf"))
      return "https://mozilla.github.io/pdf.js/web/viewer.html?file=" + encodeURIComponent(url);
    if (url.includes("docs.google.com"))
      return url.replace(/\/edit.*$/, "/preview").replace(/\/pub.*$/, "/preview");
    return url;
  }

  /* ══════════════════════════════════════════════════════
     DOCUMENT VIEWER
     ══════════════════════════════════════════════════════ */

              style: { ...S.nlSelect, color: section.color, borderColor: section.color + "44" },

            e("strong", null, "How to update:"), " Go to ",

            " \u2192 click ", e("code", { style: { background: "#fff", padding: "1px 4px", borderRadius: 3, fontSize: 12 } }, "index.html"),

  }

  /* ══════════════════════════════════════════════════════
     LANDING PAGE
     ══════════════════════════════════════════════════════ */

      e("main", { style: S.landingMain },
        !isMobile && e("div", { style: S.welcomeSection },
          e("h2", { style: S.welcomeTitle }, "Welcome!"),
          e("p", { style: S.welcomeText }, "Select an item below to view it.")),

  /* ══════════════════════════════════════════════════════
     APP
     ══════════════════════════════════════════════════════ */
  function App() {
    var activeState = useState(null);
    var active = activeState[0], setActive = activeState[1];
    var adminState = useState(false);
    var showAdmin = adminState[0], setShowAdmin = adminState[1];

    return e(Landing, {
      onSelect: function(id) { setActive(id); },
      onAdmin: function() { setShowAdmin(true); },
    });
  }
